<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arrow-white" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
    <linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d4eaf0"/>
    </linearGradient>
    <linearGradient id="nucleusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#222">Genetic Information Flow in Retroviruses</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">The "Central Dogma Exception" — RNA → DNA → RNA → Protein</text>

  <!-- HOST CELL -->
  <rect x="30" y="75" width="840" height="980" rx="30" fill="url(#cellGrad)" stroke="#7badc2" stroke-width="2.5"/>
  <text x="60" y="105" font-size="16" font-weight="bold" fill="#3a7d95">HOST CELL (Cytoplasm)</text>

  <!-- ========== STEP 1: VIRUS ENTRY ========== -->
  <!-- Virus particle outside -->
  <circle cx="130" cy="155" r="45" fill="#f5e6cc" stroke="#c9956b" stroke-width="2"/>
  <text x="130" y="140" text-anchor="middle" font-size="9" font-weight="bold" fill="#8B4513">RETROVIRUS</text>
  <!-- RNA strands inside virus -->
  <path d="M110,152 Q115,148 120,152 Q125,156 130,152 Q135,148 140,152 Q145,156 150,152" stroke="#e53935" stroke-width="2" fill="none"/>
  <path d="M110,162 Q115,158 120,162 Q125,166 130,162 Q135,158 140,162 Q145,166 150,162" stroke="#e53935" stroke-width="2" fill="none"/>
  <text x="130" y="180" text-anchor="middle" font-size="8" fill="#c62828">ssRNA (×2)</text>
  <!-- RT label inside virus -->
  <rect x="105" y="185" width="50" height="14" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="0.8"/>
  <text x="130" y="195" text-anchor="middle" font-size="7.5" fill="#e65100">Rev. Trans.</text>

  <!-- Arrow from virus into cell -->
  <line x1="180" y1="155" x2="240" y2="155" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 1 label -->
  <rect x="185" y="125" width="55" height="20" rx="10" fill="#6a1b9a" opacity="0.9"/>
  <text x="212" y="139" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 1</text>
  <text x="212" y="115" text-anchor="middle" font-size="10" fill="#4a148c" font-weight="bold">Virus enters cell;</text>
  <text x="212" y="105" text-anchor="middle" font-size="10" fill="#4a148c" font-weight="bold">RNA released</text>

  <!-- ========== STEP 2: REVERSE TRANSCRIPTION ========== -->
  <!-- RNA template -->
  <rect x="255" y="130" width="200" height="85" rx="12" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="355" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">REVERSE TRANSCRIPTION</text>
  <text x="355" y="160" text-anchor="middle" font-size="9" fill="#555">📍 Cytoplasm</text>
  
  <!-- RNA strand -->
  <path d="M275,175 Q285,170 295,175 Q305,180 315,175 Q325,170 335,175 Q345,180 355,175" stroke="#e53935" stroke-width="2.5" fill="none"/>
  <text x="275" y="190" font-size="8" fill="#c62828">Viral ssRNA template</text>
  
  <!-- Arrow down to DNA -->
  <line x1="355" y1="185" x2="355" y2="200" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DNA being made -->
  <path d="M275,207 L435,207" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M275,213 L435,213" stroke="#1565c0" stroke-width="2.5"/>
  
  <!-- Enzyme box -->
  <rect x="365" y="168" width="80" height="28" rx="5" fill="#e65100" opacity="0.9"/>
  <text x="405" y="180" text-anchor="middle" font-size="8" font-weight="bold" fill="white">🔧 ENZYME:</text>
  <text x="405" y="191" text-anchor="middle" font-size="8" fill="white">Reverse Transcriptase</text>

  <!-- Building blocks box -->
  <rect x="270" y="220" width="175" height="22" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="357" y="234" text-anchor="middle" font-size="8" fill="#0d47a1">🧱 Building blocks: deoxyribonucleotides</text>
  <text x="357" y="246" text-anchor="middle" font-size="7.5" fill="#666">(dATP, dTTP, dGTP, dCTP — free in cytoplasm)</text>

  <!-- Step 2 label -->
  <rect x="465" y="145" width="55" height="20" rx="10" fill="#6a1b9a" opacity="0.9"/>
  <text x="492" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 2</text>
  <text x="530" y="175" font-size="9" fill="#4a148c" font-weight="bold">RNA → DNA</text>
  <text x="530" y="186" font-size="8" fill="#555">(double-stranded</text>
  <text x="530" y="196" font-size="8" fill="#555">DNA copy made)</text>

  <!-- ========== BIG ARROW DOWN TO NUCLEUS ========== -->
  <line x1="355" y1="260" x2="355" y2="310" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="375" y="290" font-size="9" fill="#444" font-style="italic">dsDNA enters nucleus</text>

  <!-- ========== NUCLEUS ========== -->
  <ellipse cx="450" cy="470" rx="370" ry="195" fill="url(#nucleusGrad)" stroke="#c2185b" stroke-width="2.5"/>
  <text x="450" y="300" text-anchor="middle" font-size="16" font-weight="bold" fill="#880e4f">NUCLEUS</text>

  <!-- ========== STEP 3: INTEGRATION ========== -->
  <!-- Host DNA -->
  <path d="M120,370 Q200,365 280,370 Q360,375 440,370 Q520,365 600,370 Q680,375 760,370" stroke="#78909c" stroke-width="4" fill="none"/>
  <path d="M120,380 Q200,375 280,380 Q360,385 440,380 Q520,375 600,380 Q680,385 760,380" stroke="#78909c" stroke-width="4" fill="none"/>
  <text x="140" y="400" font-size="9" fill="#546e7a">Host cell dsDNA (chromosome)</text>
  
  <!-- Viral DNA inserting -->
  <rect x="370" y="355" width="80" height="30" rx="4" fill="#1565c0" opacity="0.15" stroke="#1565c0" stroke-width="1.5"/>
  <path d="M380,370 L440,370" stroke="#1565c0" stroke-width="3"/>
  <path d="M380,376 L440,376" stroke="#1565c0" stroke-width="3"/>
  <text x="410" y="365" text-anchor="middle" font-size="7" font-weight="bold" fill="#0d47a1">Viral DNA</text>

  <!-- Integrase enzyme label -->
  <rect x="460" y="340" width="80" height="28" rx="5" fill="#e65100" opacity="0.9"/>
  <text x="500" y="352" text-anchor="middle" font-size="8" font-weight="bold" fill="white">🔧 ENZYME:</text>
  <text x="500" y="363" text-anchor="middle" font-size="8" fill="white">Integrase</text>
  
  <!-- Step 3 label -->
  <rect x="555" y="335" width="55" height="20" rx="10" fill="#6a1b9a" opacity="0.9"/>
  <text x="582" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 3</text>
  <text x="640" y="345" font-size="9" fill="#4a148c" font-weight="bold">Viral DNA integrates</text>
  <text x="640" y="357" font-size="9" fill="#4a148c" font-weight="bold">into host genome</text>
  <text x="640" y="369" font-size="8" fill="#555">(now called a "provirus")</text>

  <!-- ========== STEP 4: TRANSCRIPTION ========== -->
  <rect x="200" y="420" width="260" height="105" rx="12" fill="white" opacity="0.7" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="330" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">TRANSCRIPTION</text>
  <text x="330" y="452" text-anchor="middle" font-size="9" fill="#555">📍 Nucleus</text>

  <!-- DNA template -->
  <path d="M220,468 L440,468" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M220,474 L440,474" stroke="#1565c0" stroke-width="2.5"/>
  <text x="230" y="465" font-size="7.5" fill="#0d47a1">Integrated viral DNA (template strand)</text>
  
  <!-- Arrow to mRNA -->
  <line x1="330" y1="478" x2="330" y2="493" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- mRNA strand -->
  <path d="M220,500 Q240,495 260,500 Q280,505 300,500 Q320,495 340,500 Q360,505 380,500 Q400,495 420,500 Q430,505 440,500" stroke="#e53935" stroke-width="2.5" fill="none"/>
  <text x="230" y="515" font-size="8" fill="#c62828">mRNA (viral RNA)</text>

  <!-- Enzyme box -->
  <rect x="280" y="480" width="100" height="15" rx="4" fill="#2e7d32" opacity="0.9"/>
  <text x="330" y="490" text-anchor="middle" font-size="7.5" font-weight="bold" fill="white">🔧 RNA Polymerase (host's)</text>

  <!-- Building blocks -->
  <rect x="205" y="518" width="165" height="16" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="287" y="529" text-anchor="middle" font-size="7.5" fill="#1b5e20">🧱 Ribonucleotides (ATP, UTP, GTP, CTP)</text>

  <!-- Step 4 label -->
  <rect x="470" y="430" width="55" height="20" rx="10" fill="#6a1b9a" opacity="0.9"/>
  <text x="497" y="444" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 4</text>
  <text x="555" y="445" font-size="9" fill="#4a148c" font-weight="bold">DNA → mRNA</text>
  <text x="555" y="457" font-size="8" fill="#555">(uses host's RNA</text>
  <text x="555" y="467" font-size="8" fill="#555">polymerase!)</text>

  <!-- ========== ARROW: mRNA exits nucleus ========== -->
  <line x1="400" y1="530" x2="400" y2="610" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="420" y="580" font-size="9" fill="#444" font-style="italic">mRNA exits nucleus</text>
  <text x="420" y="592" font-size="9" fill="#444" font-style="italic">through nuclear pore</text>

  <!-- ========== STEP 5: TRANSLATION ========== -->
  <rect x="180" y="680" width="290" height="120" rx="12" fill="#ede7f6" stroke="#5e35b1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="325" y="700" text-anchor="middle" font-size="10" font-weight="bold" fill="#4527a0">TRANSLATION</text>
  <text x="325" y="712" text-anchor="middle" font-size="9" fill="#555">📍 Cytoplasm (at Ribosomes)</text>
  
  <!-- mRNA at ribosome -->
  <path d="M200,730 Q220,725 240,730 Q260,735 280,730 Q300,725 320,730 Q340,735 360,730 Q380,725 400,730 Q420,735 440,730" stroke="#e53935" stroke-width="2" fill="none"/>
  <text x="200" y="745" font-size="7.5" fill="#c62828">mRNA</text>
  
  <!-- Ribosome shape -->
  <ellipse cx="320" cy="730" rx="35" ry="18" fill="#b39ddb" opacity="0.6" stroke="#5e35b1" stroke-width="1"/>
  <text x="320" y="734" text-anchor="middle" font-size="7" font-weight="bold" fill="#311b92">Ribosome</text>
  
  <!-- Protein chain -->
  <path d="M320,750 L320,760 L330,765 L310,775 L330,785" stroke="#ff6f00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="345" y="775" font-size="8" fill="#e65100">Viral proteins</text>
  <text x="345" y="786" font-size="8" fill="#e65100">(being assembled)</text>

  <!-- Building blocks -->
  <rect x="190" y="792" width="140" height="16" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="0.8"/>
  <text x="260" y="803" text-anchor="middle" font-size="7.5" fill="#e65100">🧱 Amino acids (20 types)</text>

  <!-- Enzyme/machinery box -->
  <rect x="340" y="792" width="120" height="16" rx="4" fill="#5e35b1" opacity="0.9"/>
  <text x="400" y="803" text-anchor="middle" font-size="7.5" font-weight="bold" fill="white">🔧 Ribosomes + tRNA (host's)</text>

  <!-- Step 5 label -->
  <rect x="490" y="690" width="55" height="20" rx="10" fill="#6a1b9a" opacity="0.9"/>
  <text x="517" y="704" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 5</text>
  <text x="580" y="700" font-size="9" fill="#4a148c" font-weight="bold">mRNA → Protein</text>
  <text x="580" y="712" font-size="8" fill="#555">(uses host's ribosomes</text>
  <text x="580" y="722" font-size="8" fill="#555">and tRNA!)</text>

  <!-- ========== STEP 6: ASSEMBLY & BUDDING ========== -->
  <line x1="325" y1="810" x2="325" y2="860" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="150" y="865" width="600" height="120" rx="12" fill="#e0f2f1" stroke="#00695c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="885" text-anchor="middle" font-size="10" font-weight="bold" fill="#004d40">ASSEMBLY &amp; RELEASE</text>
  <text x="450" y="897" text-anchor="middle" font-size="9" fill="#555">📍 Cytoplasm → Cell membrane</text>

  <!-- Viral components coming together -->
  <!-- RNA copies -->
  <path d="M200,920 Q210,915 220,920 Q230,925 240,920 Q250,915 260,920" stroke="#e53935" stroke-width="2" fill="none"/>
  <text x="200" y="940" font-size="8" fill="#c62828">Viral RNA</text>
  <text x="200" y="950" font-size="8" fill="#c62828">(copies)</text>

  <!-- Proteins -->
  <rect x="310" y="910" width="60" height="25" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="340" y="926" text-anchor="middle" font-size="8" fill="#e65100">Viral</text>
  <text x="340" y="936" text-anchor="middle" font-size="8" fill="#e65100">Proteins</text>

  <!-- Plus sign -->
  <text x="280" y="930" text-anchor="middle" font-size="18" fill="#444">+</text>

  <!-- Arrow to assembled virus -->
  <text x="390" y="930" text-anchor="middle" font-size="18" fill="#444">→</text>

  <!-- New virus particle -->
  <circle cx="460" cy="930" r="30" fill="#f5e6cc" stroke="#c9956b" stroke-width="2"/>
  <path d="M445,925 Q450,921 455,925 Q460,929 465,925 Q470,921 475,925" stroke="#e53935" stroke-width="1.5" fill="none"/>
  <path d="M445,933 Q450,929 455,933 Q460,937 465,933 Q470,929 475,933" stroke="#e53935" stroke-width="1.5" fill="none"/>
  <text x="460" y="920" text-anchor="middle" font-size="7" font-weight="bold" fill="#8B4513">NEW</text>
  <text x="460" y="945" text-anchor="middle" font-size="7" fill="#8B4513">VIRUS</text>

  <!-- Arrow out -->
  <line x1="495" y1="930" x2="550" y2="930" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Budding -->
  <text x="600" y="920" font-size="9" fill="#004d40" font-weight="bold">Buds out of</text>
  <text x="600" y="932" font-size="9" fill="#004d40" font-weight="bold">host cell to</text>
  <text x="600" y="944" font-size="9" fill="#004d40" font-weight="bold">infect new cells!</text>

  <!-- Step 6 label -->
  <rect x="450" y="960" width="55" height="20" rx="10" fill="#6a1b9a" opacity="0.9"/>
  <text x="477" y="974" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 6</text>

  <!-- ========== KEY/LEGEND ========== -->
  <rect x="560" y="105" width="290" height="170" rx="8" fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="705" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">KEY</text>
  
  <path d="M580,140 Q590,135 600,140 Q610,145 620,140" stroke="#e53935" stroke-width="2.5" fill="none"/>
  <text x="635" y="144" font-size="9" fill="#555">= RNA (single-stranded)</text>
  
  <line x1="580" y1="160" x2="620" y2="160" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="580" y1="166" x2="620" y2="166" stroke="#1565c0" stroke-width="2.5"/>
  <text x="635" y="167" font-size="9" fill="#555">= DNA (double-stranded)</text>
  
  <line x1="580" y1="185" x2="620" y2="185" stroke="#78909c" stroke-width="3"/>
  <text x="635" y="189" font-size="9" fill="#555">= Host DNA</text>

  <rect x="580" y="198" width="40" height="14" rx="3" fill="#e65100" opacity="0.9"/>
  <text x="600" y="209" text-anchor="middle" font-size="7.5" fill="white">ENZYME</text>
  <text x="635" y="209" font-size="9" fill="#555">= Enzyme involved</text>

  <rect x="580" y="220" width="40" height="14" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="0.8"/>
  <text x="600" y="230" text-anchor="middle" font-size="7" fill="#0d47a1">🧱</text>
  <text x="635" y="231" font-size="9" fill="#555">= Building blocks used</text>

  <circle cx="600" cy="255" r="14" fill="#f5e6cc" stroke="#c9956b" stroke-width="1.5"/>
  <text x="635" y="259" font-size="9" fill="#555">= Virus particle</text>

  <!-- ========== SUMMARY FLOW AT BOTTOM ========== -->
  <rect x="100" y="1000" width="700" height="50" rx="10" fill="#4a148c" opacity="0.9"/>
  <text x="450" y="1020" text-anchor="middle" font-size="12" font-weight="bold" fill="white">INFORMATION FLOW SUMMARY:</text>
  <text x="450" y="1038" text-anchor="middle" font-size="13" fill="#e1bee7">
    Viral RNA → (Rev. Transcriptase) → DNA → (Integrase) → Host Genome → (RNA Pol.) → mRNA → (Ribosome) → Viral Proteins → New Virus
  </text>

</svg>
